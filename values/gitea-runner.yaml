# values/gitea-runner.yaml — overrides for the local
# gitea-runner chart (infra/charts/gitea-runner/).

# 1. Two replicas is enough for a single-CP cluster; bump
#    per cluster.
replicaCount: 2

# 2. The in-cluster Gitea Service URL the runner polls.
#    Same-namespace services use the short name, but the
#    runner is in `gitea-runner` and gitea is in `gitea`,
#    so we need the FQDN.
gitea:
  instanceUrl: "http://gitea-http.gitea.svc.cluster.local:3000"
  runnerName: "cicd-runner"

# 3. Labels the runner advertises. Workflows in repos will
#    say `runs-on: ubuntu-22.04` (or `self-hosted`).
labels: "ubuntu-22.04:docker://ubuntu:22.04,self-hosted:host"

# 4. Ephemeral — credentials single-use.
ephemeral: true

# 5. Cache server — required for actions/cache to work.
cache:
  enabled: true
  host: "0.0.0.0"
  port: 8088

# 6. Use the host's containerd socket for jobs. k3s
#    bundles its own containerd at
#    /run/k3s/containerd/containerd.sock (the standard
#    /run/containerd/containerd.sock doesn't exist on a
#    k3s node). The runner binary uses this socket to
#    spawn job containers in the cluster's container
#    runtime, mirroring the docker-socket pattern but
#    for k3s.
runnerBackend: "containerd"
hostContainerdSocketPath: "/run/k3s/containerd/containerd.sock"