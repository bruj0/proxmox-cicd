# values/gitea.yaml — Gitea chart values for the cicd cluster.
#
# Rendered via:
#   helm upgrade --install gitea \
#     oci://docker.gitea.com/charts/gitea \
#     --version 12.0.0 \
#     -n gitea \
#     --create-namespace \
#     -f values/gitea.yaml
#
# Reference: https://gitea.com/gitea/helm-chart (params table).
#
# This chart is the upstream one (gitea.com/gitea/helm-chart).
# It comes with PostgreSQL-HA + Valkey-Cluster as default deps;
# we disable HA (single CP, single worker) and pin every
# dependency to a known version per versions.yaml.

# 1. Image pin — gitea/gitea:1.23.8-rootless (the chart
#    appVersion) is what the chart's init-app-ini was tested
#    against. The chart calls a gitea binary flag
#    (`-o`) that was removed in 1.26; we therefore let the
#    chart default to its pinned appVersion by leaving
#    `image.tag` empty. Bump this once the upstream chart
#    updates its init-app-ini template.
image:
  tag: ""
  rootless: true
  pullPolicy: IfNotPresent

# 2. Persistence — chart creates a PVC against this SC.
#    Stage 2 ships proxmox-lvm-thin; we point at it explicitly.
#    5Gi is enough for ~50 repos + LFS; bump per cluster.
persistence:
  enabled: true
  create: true
  storageClass: "proxmox-lvm-thin"
  size: 5Gi
  accessModes:
    - ReadWriteOnce
  # Keep the PVC on helm-uninstall so destroy/recreate cycles
  # don't wipe data. Run `kubectl delete pvc` manually if you
  # really want a clean slate.
  annotations:
    helm.sh/resource-policy: keep

# 1b. Top-level `global:` block. The Bitnami postgresql +
#     valkey subcharts refuse to render non-standard images
#     by default. Since we point them at docker.io/bitnamilegacy
#     (the archived bitnami repo on Docker Hub moved in 2026),
#     we opt into the substitute-image path here. This block
#     is propagated to the subcharts via the gitea chart's
#     pass-through global handling.
global:
  security:
    allowInsecureImages: true

# 3. Built-in postgresql — disable HA (single instance).
#    The chart's postgresql-ha defaults to 3 replicas which
#    won't fit on our 1-CP/1-W cluster.
postgresql-ha:
  enabled: false

# 4. Built-in postgresql (single-replica) — ENABLED.
#    The chart's single postgresql sub-chart stays enabled.
#    Pin its data PVC to the same SC.
#
#    Bitnami moved the postgresql image from docker.io/bitnami
#    to docker.io/bitnamilegacy in 2026 (the upstream Bitnami
#    Docker Hub org is now archived). We override
#    image.registry + image.repository so the chart pulls
#    from bitnamilegacy without needing to bump the chart
#    itself. Pin the tag to a concrete bitnamilegacy version.
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "17.5.0-debian-12-r2"
  global:
    postgresql:
      auth:
        database: gitea
        username: gitea
        password: gitea
        postgresPassword: gitea-postgres
  primary:
    persistence:
      enabled: true
      storageClass: "proxmox-lvm-thin"
      size: 5Gi
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# 5. Built-in valkey (single-replica, HA cluster disabled).
#    HA valkey-cluster is 6 replicas — same problem as pg.
valkey-cluster:
  enabled: false

valkey:
  enabled: true
  architecture: standalone
  # Bitnami moved the valkey image to docker.io/bitnamilegacy
  # (see postgresql section above for the rationale). The
  # Bitnami chart's pinned tag 8.1.1-debian-12-r0 only exists
  # in the archived bitnami/valkey repo; bump to a tag that
  # exists in bitnamilegacy.
  image:
    registry: docker.io
    repository: bitnamilegacy/valkey
    tag: "8.1.3-debian-12-r3"
  master:
    count: 1
    persistence:
      enabled: true
      storageClass: "proxmox-lvm-thin"
      size: 1Gi
  replica:
    count: 0
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# 6. Service — ClusterIP. The Envoy Gateway in stage 2 routes
#    to this ClusterIP via the HTTPRoute we apply separately.
service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: ClusterIP
    port: 22

# 7. Ingress — DISABLE. We use a Gateway API HTTPRoute
#    instead (see apps/gitea.py::GATEWAY_MANIFEST). The chart's
#    ingress block assumes Ingress NGINX-shaped annotations
#    and would race with our HTTPRoute.
ingress:
  enabled: false

# 8. Resources — small, single-CP cluster.
deployment:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

# 9. Admin user — initialOnlyRequireReset. The bootstrap
#    prints the one-time plaintext to stdout on first apply
#    and immediately stores it in Bitwarden Secrets Manager
#    (see apps/bitwarden_sm.py and runbook rotate-gitea-tokens).
gitea:
  admin:
    username: gitea_admin
    passwordMode: initialOnlyRequireReset
  config:
    server:
      # ROOT_URL, DOMAIN, SSH_DOMAIN are auto-derived by the
      # chart from the HTTPRoute's `host:` field at apply time.
      ENABLE_PPROF: false
  # Probes — use the documented /api/healthz endpoint
  # (https://docs.gitea.com/installation/install-on-kubernetes).
  livenessProbe:
    enabled: true
    httpGet:
      path: /api/healthz
      port: http
    initialDelaySeconds: 200
    timeoutSeconds: 5
    periodSeconds: 10
  readinessProbe:
    enabled: true
    httpGet:
      path: /api/healthz
      port: http
    initialDelaySeconds: 5
    timeoutSeconds: 1
    periodSeconds: 10