# values/vaultwarden-kubernetes-secrets.yaml — VaultwardenK8sSync
# values for the cicd cluster.
#
# Rendered via:
#   helm upgrade --install vaultwarden-kubernetes-secrets \
#     oci://ghcr.io/antoniolago/charts/vaultwarden-kubernetes-secrets \
#     --version 2.0.0 \
#     -n vaultwarden-kubernetes-secrets \
#     --create-namespace \
#     --values values/vaultwarden-kubernetes-secrets.yaml
#
# Source: https://github.com/antoniolago/vaultwarden-kubernetes-secrets
# Chart contract verified against the local clone at
# /home/bruj0/projects/vaultwarden-kubernetes-secrets/charts/.
# Pinned to chart 2.0.0 (matches Chart.yaml appVersion).

# 1. Namespace + RBAC. The chart expects the namespace to
#    already exist (namespace.create=false). The orchestrator
#    passes --create-namespace, but we also set
#    namespace.name explicitly so the auth Secret lands in
#    the right place.
namespace:
  create: false
  name: vaultwarden-kubernetes-secrets

# 2. Server URL — points at our self-hosted Vaultwarden
#    (Bitwarden-compatible) at bitwarden.bruj0.net.
env:
  config:
    VAULTWARDEN__SERVERURL: "https://bitwarden.bruj0.net"
    VAULTWARDEN__ORGANIZATIONID: ""    # operator fills in via Secret
    VAULTWARDEN__COLLECTIONID: ""      # operator fills in via Secret
    KUBERNETES__INCLUSTER: "true"
    KUBERNETES__DEFAULTNAMESPACE: "default"
    SYNC__DRYRUN: "false"
    SYNC__DELETEORPHANS: "true"
    SYNC__SYNCINTERVALSECONDS: "30"
    SYNC__CONTINUOUSSYNC: "true"
    LOGGING__LOGLEVEL__DEFAULT: "Information"

  # 3. Auth secrets — BW_CLIENTID, BW_CLIENTSECRET, and
  #    VAULTWARDEN__MASTERPASSWORD are read from a k8s Secret
  #    named `vaultwarden-kubernetes-secrets` in this namespace.
  #    The chart's auth-secret.yaml auto-creates this Secret
  #    with a random API token, but the BW_* credentials and
  #    master password are NOT auto-created. The operator
  #    must populate them after install:
  #
  #      kubectl -n vaultwarden-kubernetes-secrets create secret \
  #        generic vaultwarden-kubernetes-secrets \
  #        --from-literal=BW_CLIENTID=<uuid> \
  #        --from-literal=BW_CLIENTSECRET=<secret> \
  #        --from-literal=VAULTWARDEN__MASTERPASSWORD=<password> \
  #        --dry-run=client -o yaml | kubectl apply -f -
  #
  #    See docs/secrets.md for the full manual-flow runbook.
  secrets:
    BW_CLIENTID:
      secretName: "vaultwarden-kubernetes-secrets"
      secretKey: "BW_CLIENTID"
    BW_CLIENTSECRET:
      secretName: "vaultwarden-kubernetes-secrets"
      secretKey: "BW_CLIENTSECRET"
    VAULTWARDEN__MASTERPASSWORD:
      secretName: "vaultwarden-kubernetes-secrets"
      secretKey: "VAULTWARDEN__MASTERPASSWORD"

# 4. API + Dashboard disabled by default. The chart ships
#    with both; we keep just the sync service (Deployment
#    + ServiceAccount + RBAC + ConfigMap) on a single CP.
api:
  enabled: false

dashboard:
  enabled: false

# 5. Resource limits. Single CP / single worker — sync
#    service is small.
resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi