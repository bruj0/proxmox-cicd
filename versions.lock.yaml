# versions.lock.yaml — bootstrapper's pinned version manifest.
#
# This is the version proxmox-cicd will install. Mirrors
# proxmox-k3s/tools/versions.lock.yaml in shape and intent.

# Per-app pins. The apps read these via apps/<name>.py and
# render the helm values from values/<name>.yaml.
gitea_chart: "12.0.0"
gitea_chart_url: "oci://docker.gitea.com/charts/gitea"
gitea_image: "1.26.x"
gitea_values_file: "values/gitea.yaml"

gitea_runner_chart: "0.1.0"
# NB: this is the local chart under infra/charts/gitea-runner/.
gitea_runner_chart_path: "infra/charts/gitea-runner"
gitea_runner_image: "1.0.8"
gitea_runner_values_file: "values/gitea-runner.yaml"

vaultwarden_k8s_sync_chart: "2.0.0"
vaultwarden_k8s_sync_chart_url: "oci://ghcr.io/antoniolago/charts/vaultwarden-kubernetes-secrets"
vaultwarden_k8s_sync_chart_repo: "https://github.com/antoniolago/vaultwarden-kubernetes-secrets"
vaultwarden_k8s_sync_image: "2.0.0"
vaultwarden_k8s_sync_values_file: "values/vaultwarden-kubernetes-secrets.yaml"

rationale:
  gitea_chart: "gitea/helm-gitea v12.0.0 is the latest stable as of 2026-07-10."
  gitea_image: "1.26.x rolling major.minor; safe across patches."
  gitea_runner_chart: "First version of the in-repo chart; wraps gitea/runner:1.0.8."
  gitea_runner_image: "1.0.8 is the documented LTS per https://docs.gitea.com/runner/1.0.8/."
  vaultwarden_k8s_sync_chart: "2.0.0 is the latest stable on the ghcr.io OCI registry as of 2026-07-13."
  vaultwarden_k8s_sync_image: "2.0.0 matches the chart 2.0.0 appVersion."

sources:
  gitea: "https://gitea.com/gitea/helm-chart/releases/tag/v12.0.0"
  gitea_runner: "https://docs.gitea.com/runner/1.0.8/"
  vaultwarden_k8s_sync: "https://github.com/antoniolago/vaultwarden-kubernetes-secrets"