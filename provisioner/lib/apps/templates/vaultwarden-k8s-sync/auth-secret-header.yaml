# vaultwarden-k8s-sync/auth-secret-header.yaml —
# the static prefix of the Vaultwarden auth Secret.
# The orchestrator appends `stringData:` entries
# dynamically at apply time (keyed by what
# `.env` actually exposes). WP5.
#
# Substituted variables:
#   ${secret_name}      — the Secret name (NAMESPACE today)
#   ${namespace} — the Secret namespace (NAMESPACE today)
---
apiVersion: v1
kind: Secret
metadata:
  name: ${secret_name}
  namespace: ${namespace}
  labels:
    app.kubernetes.io/name: vaultwarden-kubernetes-secrets
    app.kubernetes.io/instance: vaultwarden-kubernetes-secrets
type: Opaque
stringData:
