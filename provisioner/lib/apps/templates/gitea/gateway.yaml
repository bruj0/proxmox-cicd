# gitea/gateway.yaml — Gateway + HTTPRoute for the
# public hostname. WP5 — moved out of `apps/gitea.py`'s
# GATEWAY_MANIFEST constant. Substituted variables:
#   ${namespace} — the gitea namespace (gitea)
#   ${host}       — the public hostname (gitea.<base_domain>)

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gitea
  namespace: ${namespace}
  labels:
    app.kubernetes.io/name: gitea
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitea
  namespace: ${namespace}
  labels:
    app.kubernetes.io/name: gitea
spec:
  parentRefs:
    - name: gitea
  hostnames:
    - ${host}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gitea
          port: 3000
