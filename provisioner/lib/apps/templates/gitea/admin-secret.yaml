# gitea/admin-secret.yaml — the chart's
# existingSecret=admin-password Secret. Carries the
# admin password (a freshly-minted random) so the
# chart's `passwordMode: keepUpdated`
# `initContainer` can change the password on pod
# start. WP5 — moved out of `apps/gitea.py`'s inline
# f-string.
#
# Substituted variables:
#   ${secret_name}      — the Secret name (ADMIN_SECRET_NAME)
#   ${namespace} — the Secret namespace (NAMESPACE)
#   ${username}  — the admin username (ADMIN_USERNAME)
#   ${password}  — the admin password (live password,
#                  freshly minted if absent on disk)
---
apiVersion: v1
kind: Secret
metadata:
  name: ${secret_name}
  namespace: ${namespace}
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: admin-credentials
type: Opaque
stringData:
  username: ${username}
  password: ${password}
