# gitea-runner/registration-secret.yaml — the
# runner Secret placeholder. Carries a known
# placeholder `registrationToken` value; VKS
# overwrites this with the real token on its first
# sync cycle. WP5.
#
# Substituted variables:
#   ${secret_name}      — the Secret name (RUNNER_CONFIG_SECRET)
#   ${namespace} — the Secret namespace (NAMESPACE)
#   ${placeholder} — the placeholder token value
---
apiVersion: v1
kind: Secret
metadata:
  name: ${secret_name}
  namespace: ${namespace}
type: Opaque
stringData:
  registrationToken: "${placeholder}"
