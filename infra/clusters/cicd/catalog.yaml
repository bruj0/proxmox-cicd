# infra/clusters/cicd/catalog.yaml — operator-edited
# configuration for the cicd cluster's app catalog.
#
# The orchestrator reads this file at every cicdctl invocation.
# `cicdctl validate cicd` parses it without touching the cluster;
# `cicdctl plan cicd` adds the live-state diff.
#
# Schema (v2, 2026-07-13):
#
#   cluster_name:    must match the CLI argument exactly
#   ingress:         base_domain -> every app's hostname is
#                    <app>.base_domain (gitea becomes
#                    gitea.bruj0.net).
#   vaultwarden:     optional. self-hosted Vaultwarden/Bitwarden
#                    server URL. Empty values disable the
#                    vaultwarden-k8s-sync app.
#   apps:            a mapping of app_name -> {enabled, ...}.
#                    Apps not listed here are skipped (but
#                    still installed apps appear in `status`).
#                    To add a 4th app: create
#                    provisioner/lib/apps/<new>.py, register
#                    it, then enable it here.

cluster_name: cicd

ingress:
  # Replace with your real public domain. The orchestrator
  # will create a Gateway + HTTPRoute for each enabled app
  # that exposes an `ingress_host`.
  base_domain: bruj0.net

# Vaultwarden / Bitwarden server URL. The vaultwarden-k8s-sync
# app reads this and points the sync service at it. Empty ->
# the app installs but stays in disconnected mode (you'd need
# to provide VAULTWARDEN__SERVERURL via env or values).
vaultwarden:
  # Self-hosted Vaultwarden URL (bitwarden-compatible).
  server_url: "https://bitwarden.bruj0.net"

apps:
  # Self-hosted Git + Actions + Packages. The user-facing
  # entry point. Persists via proxmox-lvm-thin PVC.
  gitea:
    enabled: true

  # Runs Gitea Actions jobs in Docker-in-Docker. Registration
  # token is sourced from a static k8s Secret (no longer via
  # BitwardenSecret CR since the bitwarden-sm-operator is
  # gone — replaced by vaultwarden-k8s-sync, which uses a
  # different sync model).
  gitea-runner:
    enabled: true

  # VaultwardenK8sSync — periodically polls the Vaultwarden
  # server for items tagged with the configured namespace
  # field and syncs them into Kubernetes Secrets. Replaces
  # bitwarden-sm-operator (which used BitwardenSecret CRs).
  # Configured via values/vaultwarden-kubernetes-secrets.yaml.
  vaultwarden-k8s-sync:
    enabled: true