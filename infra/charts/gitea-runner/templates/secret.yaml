{{- /*
The runner needs the registration token at startup. The bootstrap
(apps/gitea_runner.py) renders this Secret from the BitwardenSecret
CR-managed k8s Secret `gitea-runner-config` and applies it. If
the Secret already exists (idempotent re-run), helm won't touch it.
*/ -}}
{{- $secretName := printf "%s-config" (include "gitea-runner.fullname" .) -}}
{{- if not (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "gitea-runner.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Initial placeholder — the orchestrator overwrites this
  # before the Deployment starts via kubectl apply. The runner
  # pod waits until the Secret has a non-empty token (see
  # deployment.yaml's initContainer).
  registrationToken: "PLACEHOLDER-TOKEN-OVERWRITTEN-BY-ORCHESTRATOR"
{{- end }}