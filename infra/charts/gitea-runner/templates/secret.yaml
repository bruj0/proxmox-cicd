{{- /*
The runner needs the registration token at startup. The
bootstrap (apps/gitea_runner.py) does NOT write to this
Secret — VaultwardenK8sSync (the vaultwarden-k8s-sync app)
is the single writer. The apply step in apps/gitea_runner.py
treats the Secret as read-only and just verifies it exists.
VKS polls the Vaultwarden (or Bitwarden-compatible) server
for a Secure Note whose custom fields are:
  namespaces = gitea-runner
  secret-name = gitea-runner-config
  secret-key  = registrationToken
and writes the note's body into the Secret's `registrationToken`
key. The runner pod's volume mount at /etc/runner/token
then picks up the populated value. The placeholder value
below only lives long enough for the first helm install;
once VKS has written a real value, helm never touches the
Secret again (the lookup guard above).
*/ -}}
{{- $secretName := printf "%s-config" (include "gitea-runner.fullname" .) -}}
{{- if not (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "gitea-runner.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Initial placeholder — VaultwardenK8sSync overwrites
  # this within one sync interval (~5 min by default) of
  # the operator creating a Secure Note in the Vaultwarden
  # web UI with the custom fields above. The runner pod's
  # initContainer + CrashLoopBackOff loop waits for the
  # placeholder to become a real token.
  registrationToken: "PLACEHOLDER-TOKEN-OVERWRITTEN-BY-VAULTWARDEN-K8S-SYNC"
{{- end }}