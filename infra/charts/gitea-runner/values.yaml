# Default values for gitea-runner. Override per cluster in
# proxmox-cicd/values/gitea-runner.yaml.

# 1. Image — gitea/runner:1.0.8 (pinned in versions.yaml).
image:
  repository: gitea/runner
  tag: "1.0.8"
  pullPolicy: IfNotPresent

# 2. Replica count — 2 runners is enough for a single-CP/worker
#    cluster. Bump per cluster.
replicaCount: 2

# 3. Resource requests/limits.
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# 4. The Gitea instance URL the runner polls. Sourced from
#    catalog.ingress.base_domain; rendered into the Deployment
#    env at apply time.
gitea:
  instanceUrl: "http://gitea.gitea.svc.cluster.local:3000"
  runnerName: "cicd-runner"

# 5. Labels the runner advertises to Gitea. Used by workflows
#    in `runs-on:` to dispatch jobs.
labels: "ubuntu-22.04:docker://ubuntu:22.04,self-hosted:host"

# 6. Ephemeral runner — credentials are single-use and
#    discarded after each job. Safer for an exposed runner.
ephemeral: true

# 7. Cache server port (advanced config). The runner serves a
#    local cache to action runners in the same network.
cache:
  enabled: true
  host: "0.0.0.0"
  port: 8088

# 8. ServiceAccount + RBAC. The runner needs to be able to
#    create ephemeral Pods (when running kubernetes-native
#    jobs) and read Secret + ConfigMap (for env injection).
serviceAccount:
  create: true
  name: ""

# 9. Docker-in-Docker. The runner spawns job containers in
#    Docker; we mount the host's docker socket so the runner
#    can `docker run` against the cluster's containerd.
#    Set to "dind" to use a nested daemon instead.
runnerBackend: "docker"
hostDockerSocketPath: "/var/run/docker.sock"

# 10. Probe — use the runner's /-/ready endpoint (gitea
#     runner 1.x exposes this for k8s).
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 30

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10